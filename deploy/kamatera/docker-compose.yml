name: pdf-office-engine-contest

services:
  office-engine:
    build:
      context: ../..
      dockerfile: engine/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "8787"
    init: true
    mem_limit: ${OFFICE_ENGINE_MEMORY_LIMIT:-1536m}
    cpus: ${OFFICE_ENGINE_CPU_LIMIT:-1.0}
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - backend

  caddy:
    image: caddy:2-alpine
    environment:
      DEMO_DOMAIN: ${DEMO_DOMAIN:?Set DEMO_DOMAIN in deploy/kamatera/.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      office-engine:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - edge
      - backend

networks:
  edge: {}
  backend:
    internal: true

volumes:
  caddy_data: {}
  caddy_config: {}
